<!DOCTYPE html>
<html>
<head>

<title>Our Story ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI',sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* countdown */

#countdown{
position:absolute;
font-size:150px;
font-weight:bold;
opacity:0.9;
}

/* photo */

#photo{
max-width:80%;
max-height:65vh;
border-radius:20px;
box-shadow:0 10px 40px rgba(255,255,255,0.3);
opacity:0;
transition:opacity 2s;
display:none;
}

.fadeIn{
opacity:1 !important;
}

/* lyrics */

#lyrics{
margin-top:25px;
font-size:26px;
max-width:700px;
line-height:1.6;
min-height:60px;
display:none;
}

</style>

</head>

<body>

<div id="countdown">3</div>

<img id="photo" src="photo1.jpg">

<div id="lyrics"></div>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* COUNTDOWN */

let count=3;
let countdown=document.getElementById("countdown");

let timer=setInterval(()=>{

count--;

if(count>0){
countdown.innerText=count;
}

else{

clearInterval(timer);
countdown.style.display="none";
startSlideshow();

}

},1000);


/* START SHOW */

function startSlideshow(){

document.getElementById("photo").style.display="block";
document.getElementById("lyrics").style.display="block";

document.getElementById("music").play();

startPhotos();

}


/* PHOTOS */

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
];

let photo=document.getElementById("photo");

let index=0;

function startPhotos(){

photo.classList.add("fadeIn");

setInterval(()=>{

photo.classList.remove("fadeIn");

setTimeout(()=>{

index++;

if(index>=photos.length){
index=0;
}

photo.src=photos[index];

photo.classList.add("fadeIn");

},1000);

},5000);

}


/* LYRICS */

let lyricsData=[
{time:3, text:"This song reminds me of you ❤️"},
{time:9, text:"Every moment with you feels magical"},
{time:16, text:"Every memory we created is special"},
{time:24, text:"And I want thousands more with you"},
{time:32, text:"Forever with you ❤️"}
];

let music=document.getElementById("music");
let lyricsBox=document.getElementById("lyrics");

music.addEventListener("timeupdate",function(){

let current=music.currentTime;

lyricsData.forEach(line=>{

if(current>=line.time){
lyricsBox.innerText=line.text;
}

});

});

</script>

</body>
</html>
