<!DOCTYPE html>
<html>
<head>

<title>Our Story ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI',sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* start screen */

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-size:30px;
cursor:pointer;
}

/* countdown */

#countdown{
position:absolute;
font-size:150px;
font-weight:bold;
opacity:0.9;
display:none;
}

/* photo */

#photo{
max-width:85%;
max-height:70vh;
border-radius:20px;
box-shadow:0 10px 40px rgba(255,255,255,0.3);
opacity:0;
transition:opacity 2s;
display:none;
}

.fadeIn{
opacity:1 !important;
}

</style>

</head>

<body>

<div id="startScreen">Tap to start our story ❤️</div>

<div id="countdown">3</div>

<img id="photo" src="photo1.jpeg">

<audio id="music">
<source src="lovestorysong.mp3" type="audio/mpeg">
</audio>

<script>

let startScreen=document.getElementById("startScreen");
let countdown=document.getElementById("countdown");
let music=document.getElementById("music");

/* start on click */

startScreen.onclick=function(){

startScreen.style.display="none";

music.play();

startCountdown();

}


/* countdown */

function startCountdown(){

countdown.style.display="block";

let count=3;

let timer=setInterval(()=>{

count--;

if(count>0){
countdown.innerText=count;
}
else{

clearInterval(timer);
countdown.style.display="none";
startShow();

}

},1000);

}


/* start slideshow */

function startShow(){

document.getElementById("photo").style.display="block";

startPhotos();

}


/* photos */

let photos=[];

for(let i=1;i<=22;i++){
photos.push("photo"+i+".jpeg");
}

let index=0;
let photo=document.getElementById("photo");

function startPhotos(){

photo.classList.add("fadeIn");

setInterval(()=>{

photo.classList.remove("fadeIn");

setTimeout(()=>{

index++;

if(index>=photos.length){
index=0;
}

photo.src=photos[index];

photo.classList.add("fadeIn");

},1000);

},13000);

}

</script>

</body>
</html>
