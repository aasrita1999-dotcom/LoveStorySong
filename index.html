<!DOCTYPE html>
<html>
<head>

<title>Our Story ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:'Segoe UI',sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* start screen */

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-size:30px;
cursor:pointer;
}

/* countdown */

#countdown{
position:absolute;
font-size:150px;
font-weight:bold;
opacity:0.9;
display:none;
}

/* photo */

#photo{
max-width:85%;
max-height:70vh;
border-radius:20px;
box-shadow:0 10px 40px rgba(255,255,255,0.3);
opacity:0;
transition:opacity 2s, transform 13s linear;
transform:scale(1);
display:none;
}

/* zoom effect */

.zoom{
transform:scale(1.15);
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

/* ending scene */

#ending{
position:absolute;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
width:100%;
background:black;
font-size:40px;
}

#heart{
font-size:120px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{transform:scale(1); opacity:0.8;}
to{transform:scale(1.2); opacity:1;}
}

.fadeIn{
opacity:1 !important;
}

</style>

</head>

<body>

<div id="startScreen">Tap to start our story ❤️</div>

<div id="countdown">3</div>

<img id="photo" src="photo1.jpeg">

<div id="ending">
<div id="heart">❤️</div>
<div>Our Story is just beginning...</div>
<div style="font-size:28px;margin-top:15px">Forever with you My Love❤️</div>
</div>

<audio id="music">
<source src="lovestorysong.mp3" type="audio/mpeg">
</audio>

<script>

let startScreen=document.getElementById("startScreen");
let countdown=document.getElementById("countdown");
let music=document.getElementById("music");

/* start on click */

startScreen.onclick=function(){

startScreen.style.display="none";

music.play();

startCountdown();

}

/* countdown */

function startCountdown(){

countdown.style.display="block";

let count=3;

let timer=setInterval(()=>{

count--;

if(count>0){
countdown.innerText=count;
}
else{

clearInterval(timer);
countdown.style.display="none";
startShow();

}

},1000);

}

/* slideshow */

function startShow(){

document.getElementById("photo").style.display="block";

startPhotos();

startHearts();

}

/* photos */

let photos=[];

for(let i=1;i<=22;i++){
photos.push("photo"+i+".jpeg");
}

let index=0;
let photo=document.getElementById("photo");

function startPhotos(){

photo.classList.add("fadeIn");
photo.classList.add("zoom");

setInterval(()=>{

photo.classList.remove("fadeIn");
photo.classList.remove("zoom");

setTimeout(()=>{

index++;

if(index>=photos.length){
index=0;
}

photo.src=photos[index];

photo.classList.add("fadeIn");
photo.classList.add("zoom");

},1000);

},13000);

}

/* floating hearts */

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

}

/* ending after song */

music.onended=function(){

document.getElementById("photo").style.display="none";

document.getElementById("ending").style.display="flex";

}

</script>

</body>
</html>
